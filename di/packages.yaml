exceptions:
  arch:
    - pipewire: pipewire pipewire-alsa pipewire-pulseaudio pamixer
  ubuntu:
    - extension-manager: gnome-shell-extension-manager
    - gnome: skip
    - pipewire: skip
    - gtk-engine-murrine: gtk2-engines-murrine
    - polkit-gnome: policykit-1-gnome
    - niri: skip                          # built by install_niri_stack_ubuntu
    - xwayland-satellite: skip            # built by install_niri_stack_ubuntu
    - cliphist: skip                      # built by install_niri_stack_ubuntu
    - wlsunset: skip                      # built by install_niri_stack_ubuntu
    - dart-sass: skip                     # built by install_niri_stack_ubuntu
    - catppuccin-gtk-theme-mocha: skip    # built by install_niri_stack_ubuntu
    - papirus-folders-catppuccin-git: skip # built by install_niri_stack_ubuntu
    - pwvucontrol: skip                   # built by install_niri_stack_ubuntu
    - swappy: skip                        # not in Ubuntu 24.04 apt repos
    - noctalia-shell: skip                # installed via apt repo in install_niri_stack_ubuntu
    - libva-utils: vainfo
    - polkit: polkitd
    - nvidia-open-dkms: skip             # handled by ubuntu-drivers in configure_nvidia_for_niri
    - nvidia-utils: skip                 # handled by ubuntu-drivers in configure_nvidia_for_niri
    - libva-nvidia-driver: skip          # handled by ubuntu-drivers in configure_nvidia_for_niri

