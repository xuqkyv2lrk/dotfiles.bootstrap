exceptions:
  arch:
    - bluetooth: bluez bluez-utils
    - docker: docker docker-buildx docker-compose
    - gcc-c++: gcc
    - man-db: man-db man-pages
    - openssl-devel: skip
    - qemu: qemu-full

  ubuntu:
    - cloudflared: skip
    - docker: docker.io docker-compose
    - fd: fd-find
    - firefox: skip           # installed separately via Mozilla APT repo
    - gcc-c++: g++
    - go: golang-go
    - libvirt: libvirt-daemon-system libvirt-clients
    - ncspot: skip
    - noto-fonts: fonts-noto
    - noto-fonts-cjk: fonts-noto-cjk
    - noto-fonts-emoji: fonts-noto-color-emoji
    - noto-fonts-extra: fonts-noto-extra
    - openresolv: skip
    - openssh: openssh-client openssh-server
    - openssl-devel: libssl-dev
    - pinentry: pinentry-gnome3
    - python: python3
    - qemu: qemu-system-x86 qemu-kvm
    - thunderbird: skip       # installed separately via Mozilla APT repo
    - virt-install: virtinst
    - yazi: skip              # installed via binary release in _install_binaries
    - yt-dlp: skip            # installed via pip in _install_media_tools
